<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>what should i watch tonight?</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>what should i watch tonight?</h1>

    <label for="medium">i want to watch a...</label>
    <select id="medium">
        <option value="">any medium</option>
    </select>

    <label for="length">with a runtime less than...</label>
    <select id="length">
        <option value="9999">any length</option>
        <option value="60">1 hour</option>
        <option value="90">1.5 hours</option>
        <option value="120">2 hours</option>
        <option value="150">2.5 hours</option>
        <option value="180">3 hours</option>

    </select>

    <label>and the vibes are...</label>
    <div id="vibesContainer"></div>


    <button id="pickMovie">tonight i should watch...</button>
    <button id="randomMovie">i'm feelin' lucky!</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
